table:
  name: project_star
  schema: public
object_relationships:
  - name: project
    using:
      foreign_key_constraint_on: project_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: zxplay-user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - project_id
select_permissions:
  - role: public
    permission:
      columns:
        - user_id
        - project_id
        - created_at
      filter: {}
      allow_aggregations: true
  - role: zxplay-user
    permission:
      columns:
        - user_id
        - project_id
        - created_at
      filter: {}
      allow_aggregations: true
delete_permissions:
  - role: zxplay-user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
