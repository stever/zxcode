table:
  name: project_star
  schema: public
object_relationships:
  - name: project
    using:
      foreign_key_constraint_on: project_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: zxplay-user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - project_id
select_permissions:
  - role: public
    permission:
      columns:
        - user_id
        - project_id
        - created_at
      # Stars are only visible while the project is public. Rows persist when a
      # project is made private (so they return if it is published again) but
      # they are hidden from counts, stargazer lists and starred-project listings.
      filter:
        project:
          is_public:
            _eq: true
      allow_aggregations: true
  - role: zxplay-user
    permission:
      columns:
        - user_id
        - project_id
        - created_at
      # As public, plus the project owner can always see stars on their own
      # projects even while private.
      filter:
        _or:
          - project:
              is_public:
                _eq: true
          - project:
              owner_user_id:
                _eq: X-Hasura-User-Id
      allow_aggregations: true
delete_permissions:
  - role: zxplay-user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
